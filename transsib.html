<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Странник">
<meta name="theme-color" content="#8b4513">
<title>Странник</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500&display=swap');

:root{
  --bg:#0f0a1e;
  --bg2:#160d2b;
  --bg3:#1e1438;
  --sf:#1c1232;
  --sf2:#241a3e;
  --ac:#7c3aed;
  --ac2:#6d28d9;
  --acbg:rgba(124,58,237,.12);
  --acbr:rgba(124,58,237,.3);
  --sky:#38bdf8;
  --skybg:rgba(56,189,248,.1);
  --tx:#e8e0ff;
  --tx2:#9d8fcc;
  --tx3:#5a4f7a;
  --gr:#34d399;
  --rd:#f87171;
  --br:rgba(124,58,237,0.15);
  --br2:rgba(124,58,237,0.28);
  --r:12px;
  --rs:7px;
  --hand:'Caveat',cursive;
  --sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}

/* Stars bg */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,.4) 0%, transparent 100%),
  radial-gradient(1px 1px at 72% 8%, rgba(255,255,255,.3) 0%, transparent 100%),
  radial-gradient(1px 1px at 38% 55%, rgba(255,255,255,.25) 0%, transparent 100%),
  radial-gradient(1px 1px at 85% 42%, rgba(255,255,255,.35) 0%, transparent 100%),
  radial-gradient(1px 1px at 52% 78%, rgba(255,255,255,.2) 0%, transparent 100%),
  radial-gradient(1px 1px at 8% 65%, rgba(255,255,255,.3) 0%, transparent 100%),
  radial-gradient(1px 1px at 93% 88%, rgba(255,255,255,.25) 0%, transparent 100%),
  radial-gradient(1.5px 1.5px at 28% 90%, rgba(255,255,255,.2) 0%, transparent 100%),
  radial-gradient(200px 200px at 80% 10%, rgba(124,58,237,.08) 0%, transparent 100%),
  radial-gradient(300px 300px at 10% 80%, rgba(56,189,248,.05) 0%, transparent 100%);
pointer-events:none;z-index:0;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1a0b35 0%,#0d1a3a 100%);border-bottom:1px solid var(--br2);padding:0 16px;position:sticky;top:0;z-index:100;display:flex;align-items:stretch;justify-content:space-between;box-shadow:0 2px 20px rgba(124,58,237,.2);}
.hdr-left{display:flex;align-items:center;gap:10px;padding:11px 0;}
.logo-mark{width:30px;height:30px;border:1.5px solid rgba(124,58,237,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--acbg);}
.logo-txt{font-family:var(--hand);font-size:24px;font-weight:700;background:linear-gradient(135deg,#c084fc,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;line-height:1;}
.logo-sub{font-family:var(--hand);font-size:14px;color:var(--tx3);margin-top:1px;}
.hdr-r{display:flex;gap:4px;align-items:center;}
.hb{background:var(--acbg);border:1px solid var(--br2);color:var(--tx2);padding:6px 10px;border-radius:var(--rs);font-size:13px;cursor:pointer;}
.hb:active{background:rgba(124,58,237,.25);color:var(--tx);}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--br);position:relative;z-index:1;}
.tab{flex:1;padding:11px 6px;font-size:11px;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;text-align:center;font-family:var(--sans);background:none;border-top:none;border-left:none;border-right:none;text-transform:uppercase;letter-spacing:.7px;transition:color .15s;}
.tab.active{color:var(--sky);border-bottom-color:var(--sky);}

/* PAGES */
.page{display:none;padding:16px 16px 90px;max-width:600px;margin:0 auto;position:relative;z-index:1;}
.page.active{display:block;}
.card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.sec{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.4px;margin:20px 0 8px;display:flex;align-items:center;justify-content:space-between;font-family:var(--sans);}
.empty{text-align:center;color:var(--tx3);font-size:16px;padding:28px 0;font-family:var(--hand);}

/* INPUTS */
input,textarea,select{background:var(--bg3);border:1px solid var(--br2);border-radius:var(--rs);color:var(--tx);padding:9px 11px;font-size:14px;font-family:var(--sans);outline:none;width:100%;transition:border-color .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--ac);background:var(--sf);}
textarea{resize:vertical;min-height:56px;}
select option{background:var(--bg3);}

/* BUTTONS */
.btn{background:linear-gradient(135deg,var(--ac),#5b21b6);border:none;border-radius:var(--rs);color:#fff;padding:9px 16px;font-size:14px;font-weight:500;font-family:var(--sans);cursor:pointer;white-space:nowrap;flex-shrink:0;box-shadow:0 2px 8px rgba(124,58,237,.3);}
.btn:active{opacity:.85;}
.btn-sm{background:var(--sf2);border:1px solid var(--br2);color:var(--tx2);border-radius:var(--rs);padding:7px 13px;font-size:13px;font-family:var(--sans);cursor:pointer;}
.btn-sm:active{background:var(--bg3);}
.btn-g{background:transparent;border:1px solid var(--br2);color:var(--tx2);border-radius:var(--rs);padding:5px 10px;font-size:12px;font-family:var(--sans);cursor:pointer;transition:border-color .15s,color .15s;}
.btn-g:active,.btn-g:hover{border-color:var(--ac);color:var(--tx);}
.btn-d{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--rd);border-radius:var(--rs);padding:4px 8px;font-size:12px;font-family:var(--sans);cursor:pointer;}
.btn-d:active{background:rgba(248,113,113,.2);}
.row{display:flex;gap:8px;margin-top:8px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;backdrop-filter:blur(4px);}
.mo.open{display:flex;}
.mo-box{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px 16px 36px;width:100%;max-width:600px;margin:0 auto;border-top:2px solid var(--ac);max-height:92vh;overflow-y:auto;box-shadow:0 -4px 32px rgba(124,58,237,.2);}
.mo-title{font-family:var(--hand);font-size:22px;font-weight:700;margin-bottom:14px;background:linear-gradient(135deg,#c084fc,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.mo-r{margin-bottom:10px;}
.mo-l{font-size:11px;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px;}
.mo-act{display:flex;gap:8px;margin-top:16px;}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.stat{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:13px 15px;}
.sl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.sv{font-size:28px;font-family:var(--hand);font-weight:700;}
.sv.ac{color:var(--ac);}.sv.rd{color:var(--rd);}.sv.gr{color:var(--gr);}
.sv.counting{animation:countpop .3s ease-out;}
@keyframes countpop{0%{transform:scale(1.12);}100%{transform:scale(1);}}

/* BUDGET */
.budget-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:10px 0 4px;}
.bar-f{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.25,.46,.45,.94);}
.bl-ok{background:linear-gradient(90deg,#059669,var(--gr));}
.bl-w{background:linear-gradient(90deg,#d97706,#fbbf24);}
.bl-d{background:linear-gradient(90deg,#dc2626,var(--rd));}
.bar-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);}
.next-card{background:var(--acbg);border:1px solid var(--acbr);border-left:3px solid var(--ac);border-radius:var(--r);padding:13px 15px;margin-bottom:10px;}
.hint{background:var(--acbg);border:1px solid var(--acbr);border-radius:var(--rs);padding:10px 13px;font-size:13px;color:var(--sky);margin-bottom:14px;line-height:1.5;}
.hint b{display:block;margin-bottom:3px;font-family:var(--hand);font-size:17px;color:var(--tx);}
.xb{float:right;cursor:pointer;color:var(--tx3);font-style:normal;}

/* CITY CARDS */
.city-block{margin-bottom:8px;}
.city-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.city-card.open{border-color:var(--acbr);box-shadow:0 0 0 1px var(--acbg),0 4px 16px rgba(124,58,237,.12);}
.city-card.completed{opacity:.55;}
.city-head{padding:14px 15px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;user-select:none;transition:background .15s;}
.city-head:active{background:var(--sf2);}
.city-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--sky));flex-shrink:0;margin-top:6px;box-shadow:0 0 8px rgba(124,58,237,.5);transition:transform .2s;}
.city-card.open .city-dot{transform:scale(1.4);}
.city-card.completed .city-dot{background:var(--tx3);box-shadow:none;}
.city-info{flex:1;}
.city-name{font-size:20px;font-family:var(--hand);font-weight:700;color:var(--tx);line-height:1.1;}
.city-sub{font-size:12px;color:var(--tx3);margin-top:3px;}
.city-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--tx3);border:1px solid var(--br);}
.tag.ac{background:var(--acbg);color:var(--ac);border-color:var(--acbr);}
.arr{color:var(--tx3);font-size:10px;transition:transform .22s;margin-top:5px;}
.city-card.open .arr{transform:rotate(180deg);}
.city-body{display:none;border-top:1px solid var(--br);padding:14px 15px 16px;background:var(--bg);}
.city-card.open .city-body{display:block;animation:unfold .22s ease-out;}
@keyframes unfold{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.city-stamp{font-family:var(--hand);font-size:11px;font-weight:700;color:var(--gr);border:1.5px solid var(--gr);border-radius:4px;padding:1px 7px;letter-spacing:1px;text-transform:uppercase;transform:rotate(-2deg);display:inline-block;opacity:.9;}

/* TRANSIT */
.transit{display:flex;align-items:stretch;margin:4px 0;}
.transit-line{width:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;gap:3px;padding:4px 0;}
.transit-dot{width:3px;height:3px;border-radius:50%;background:var(--br2);}
.transit-content{flex:1;background:var(--sf2);border:1px solid var(--br);border-radius:var(--rs);padding:9px 12px;display:flex;align-items:center;gap:10px;}
.transit-vehicle{font-size:16px;flex-shrink:0;display:inline-block;animation:vehicleMove 3s ease-in-out infinite;}
@keyframes vehicleMove{0%,100%{transform:translateX(0);}50%{transform:translateX(4px);}}
.transit-info{flex:1;min-width:0;}
.transit-main{font-size:14px;color:var(--tx);font-family:var(--hand);font-weight:600;}
.transit-detail{font-size:11px;color:var(--tx3);margin-top:2px;}
.transit-dur{font-size:13px;color:var(--sky);flex-shrink:0;font-weight:600;font-family:var(--hand);}

/* TASKS */
.task-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--br);}
.task-item:last-child{border-bottom:none;}
.chk{width:19px;height:19px;border:1.5px solid var(--br2);border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chk:active{transform:scale(.88);}
.chk.done{background:rgba(52,211,153,.12);border-color:var(--gr);}
.chk svg{width:11px;height:11px;display:none;}
.chk.done svg{display:block;}
.chk.done svg path{stroke-dasharray:20;stroke-dashoffset:0;animation:drawcheck .25s ease-out forwards;}
@keyframes drawcheck{from{stroke-dashoffset:20;}to{stroke-dashoffset:0;}}
.task-tx{font-size:14px;line-height:1.4;flex:1;font-family:var(--sans);}
.task-tx.done{color:var(--tx3);}
.task-tx-inner{position:relative;display:inline;}
.task-tx-inner::after{content:'';position:absolute;left:0;top:50%;height:1.5px;background:var(--tx3);width:100%;transform:scaleX(0);transform-origin:left;}
.task-tx.done .task-tx-inner::after{transform:scaleX(1);}
.task-tx.done-anim .task-tx-inner::after{animation:strikethrough .35s ease-out forwards;}
@keyframes strikethrough{from{transform:scaleX(0);}to{transform:scaleX(1);}}
.dx{color:var(--tx3);font-size:14px;cursor:pointer;padding:0 3px;flex-shrink:0;}
.dx:active{color:var(--rd);}
.task-who{font-size:10px;padding:1px 6px;border-radius:6px;flex-shrink:0;margin-top:3px;display:inline-block;}
.task-who.both{background:rgba(124,58,237,.15);color:#c084fc;}
.task-who.me{background:rgba(56,189,248,.1);color:var(--sky);}
.task-who.wife{background:rgba(248,113,113,.1);color:#fca5a5;}

/* EXPENSES */
.exp-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--br);}
.exp-item:last-child{border-bottom:none;}
.ecat{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.et{background:rgba(56,189,248,.1);}.ef{background:rgba(52,211,153,.1);}.es{background:rgba(124,58,237,.15);}.ek{background:rgba(248,113,113,.1);}.eo{background:rgba(167,139,250,.1);}
.enm{font-size:13px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.eam{font-size:15px;color:var(--rd);flex-shrink:0;font-family:var(--hand);font-weight:600;}
.ex2{font-size:10px;color:var(--tx3);flex-shrink:0;}

/* TICKETS */
.tstrip{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;}
.trow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--br);}
.trow:last-child{border-bottom:none;}
.tico{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tico.pdf{background:rgba(248,113,113,.12);}.tico.img{background:rgba(56,189,248,.1);}
.ti{flex:1;min-width:0;}
.tn{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.tm{font-size:11px;color:var(--tx3);margin-top:1px;}
.tthumb{width:42px;height:42px;border-radius:5px;object-fit:cover;cursor:pointer;border:1px solid var(--br);}
.drop-z{border:1.5px dashed var(--br2);border-radius:var(--rs);padding:18px;text-align:center;font-size:15px;color:var(--tx3);cursor:pointer;line-height:1.8;margin-bottom:10px;font-family:var(--hand);transition:all .2s;}
.drop-z:hover,.drop-z.dg{border-color:var(--ac);color:var(--ac);background:var(--acbg);}

/* CHECKLIST */
.chk-section{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:14px 15px;margin-bottom:10px;}
.chk-section-title{font-size:16px;color:var(--tx2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;font-family:var(--hand);font-weight:600;}

/* WEATHER */
.wx-city-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.wx-city-name{font-size:15px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.wx-day-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--br);font-size:13px;}
.wx-day-row:last-child{border-bottom:none;}
.wx-ico{font-size:18px;width:26px;text-align:center;flex-shrink:0;}
.wx-date{color:var(--tx3);width:72px;flex-shrink:0;font-size:12px;}
.wx-desc{flex:1;color:var(--tx2);font-size:12px;}
.wx-temp{font-size:15px;font-family:var(--hand);font-weight:700;color:var(--tx);flex-shrink:0;text-align:right;}
.wx-temp span{font-size:12px;color:var(--tx3);font-weight:400;}

/* VIEWER */
.viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:300;flex-direction:column;}
.viewer.open{display:flex;}
.vh{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--br);flex-shrink:0;}
.vb{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:14px;}
.vb img{max-width:100%;max-height:100%;border-radius:6px;}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--br2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo-mark">✦</div>
    <div>
      <div class="logo-txt" onclick="openM('m-tripname')" title="Нажмите чтобы изменить название">
        <span id="trip-name-display">Странник</span>
      </div>
      <div class="logo-sub" id="trip-route-display"></div>
    </div>
  </div>
  <div class="hdr-r">
    <button class="hb" onclick="exportData()" title="Сохранить файл">&#x1F4BE;</button>
    <button class="hb" onclick="shareData()" title="Поделиться">&#x1F4E4;</button>
    <button class="hb" onclick="importData()" title="Импорт">&#x1F4E5;</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('overview',this)" id="tab-overview">&#x421;&#x432;&#x43E;&#x434;&#x43A;&#x430;</button>
  <button class="tab" onclick="showPage('journey',this)" id="tab-journey">&#x41C;&#x430;&#x440;&#x448;&#x440;&#x443;&#x442;</button>
  <button class="tab" onclick="showPage('checklist',this)" id="tab-checklist">&#x427;&#x435;&#x43A;&#x43B;&#x438;&#x441;&#x442;</button>
  <button class="tab" onclick="showPage('weather',this)" id="tab-weather">&#x41F;&#x43E;&#x433;&#x43E;&#x434;&#x430;</button>
</div>

<div class="page active" id="page-overview"></div>
<div class="page" id="page-journey"></div>
<div class="page" id="page-checklist"></div>
<div class="page" id="page-weather"></div>

<div class="mo" id="m-city">
  <div class="mo-box">
    <div class="mo-title" id="m-city-title">&#x41D;&#x43E;&#x432;&#x44B;&#x439; &#x433;&#x43E;&#x440;&#x43E;&#x434;</div>
    <input type="hidden" id="cy-edit-id">
    <div class="mo-r"><div class="mo-l">&#x413;&#x43E;&#x440;&#x43E;&#x434;</div><input id="cy-name" placeholder="&#x415;&#x43A;&#x430;&#x442;&#x435;&#x440;&#x438;&#x43D;&#x431;&#x443;&#x440;&#x433;"></div>
    <div class="g2" style="margin-bottom:10px;">
      <div><div class="mo-l">&#x41F;&#x440;&#x438;&#x435;&#x437;&#x434;</div><input type="date" id="cy-from"></div>
      <div><div class="mo-l">&#x41E;&#x442;&#x44A;&#x435;&#x437;&#x434;</div><input type="date" id="cy-to"></div>
    </div>
    <div class="mo-r"><div class="mo-l">&#x41E;&#x442;&#x435;&#x43B;&#x44C;</div><input id="cy-hotel" placeholder="Ibis &#x426;&#x435;&#x43D;&#x442;&#x440;"></div>
    <div class="mo-r"><div class="mo-l">&#x417;&#x430;&#x43C;&#x435;&#x442;&#x43A;&#x438;</div><textarea id="cy-note"></textarea></div>
    <div class="mo-act">
      <button class="btn" style="flex:1" id="cy-save-btn" onclick="saveCity()">&#x414;&#x43E;&#x431;&#x430;&#x432;&#x438;&#x442;&#x44C;</button>
      <button class="btn-sm" onclick="closeM('m-city')">&#x41E;&#x442;&#x43C;&#x435;&#x43D;&#x430;</button>
    </div>
  </div>
</div>

<div class="mo" id="m-transit">
  <div class="mo-box">
    <div class="mo-title" id="m-transit-title">&#x41F;&#x435;&#x440;&#x435;&#x433;&#x43E;&#x43D;</div>
    <input type="hidden" id="tr-edit-id">
    <div class="g2" style="margin-bottom:10px;">
      <div><div class="mo-l">&#x41E;&#x442;&#x43A;&#x443;&#x434;&#x430;</div><input id="tr-from" placeholder="&#x41C;&#x43E;&#x441;&#x43A;&#x432;&#x430;"></div>
      <div><div class="mo-l">&#x41A;&#x443;&#x434;&#x430;</div><input id="tr-to" placeholder="&#x41A;&#x430;&#x437;&#x430;&#x43D;&#x44C;"></div>

<script>

'use strict';

// ── STATE ──
var S = {journey:[],checklist:[],tickets:[],budget:{total:0,pp:'total'},tripName:'Странник',tripRoute:''};
var KEY = 'transsib_v4';

function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(S)); }
  catch(e){ alert('Хранилище заполнено — удалите билеты или экспортируйте данные.'); }
}

function load(){
  var raw = localStorage.getItem(KEY)
    || localStorage.getItem('transsib_v3')
    || localStorage.getItem('transsib_v2')
    || localStorage.getItem('transsib_v1');
  if(!raw) return;
  try{
    var d = JSON.parse(raw);
    if(d.journey){
      S = d;
    } else {
      // migrate from v1/v2
      S.budget = {total: d.budget||0, pp:'total'};
      S.tickets = d.tickets||[];
      S.checklist = [];
      var stops = d.route||[];
      var days = d.days||[];
      S.journey = stops.map(function(stop){
        var tasks = [];
        days.forEach(function(day){
          if(day.name && stop.city && (
            day.name.toLowerCase().indexOf(stop.city.toLowerCase()) >= 0 ||
            stop.city.toLowerCase().indexOf(day.name.toLowerCase()) >= 0
          )){
            (day.tasks||[]).forEach(function(t){ tasks.push({id:t.id,text:t.text,done:t.done,who:'both'}); });
          }
        });
        return {
          kind:'city', id:stop.id||uid(),
          name:stop.city||'', from:stop.arrive?(stop.arrive+'').slice(0,10):'',
          to:stop.depart?(stop.depart+'').slice(0,10):'',
          hotel:'', note:stop.note||'', tasks:tasks,
          expenses:[], links:stop.links||[]
        };
      });
      days.forEach(function(day){
        var matched = stops.some(function(s){
          return s.city && day.name && day.name.toLowerCase().indexOf(s.city.toLowerCase()) >= 0;
        });
        if(!matched){
          S.journey.push({
            kind:'city', id:day.id||uid(), name:day.name||'',
            from:day.date||'', to:'', hotel:'', note:day.note||'',
            tasks:(day.tasks||[]).map(function(t){ return {id:t.id,text:t.text,done:t.done,who:'both'}; }),
            expenses:(day.expenses||[]).map(function(e){ return {id:e.id,name:e.name,amount:e.amount,cat:e.cat||'o',x2:1}; }),
            links:[]
          });
        }
      });
      (d.notes||[]).forEach(function(n){
        S.checklist.push({id:n.id||uid(),text:n.text,done:false,who:'both',cat:'other'});
      });
    }
  } catch(e){ console.warn('load error', e); }
  if(!S.journey) S.journey=[];
  if(!S.checklist) S.checklist=[];
  if(!S.tickets) S.tickets=[];
  if(!S.budget) S.budget={total:0,pp:'total'};
  if(!S.tripName) S.tripName='Странник';
  if(S.tripRoute===undefined) S.tripRoute='';
  save();
  updateHeader();
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function updateHeader(){
  var nd=document.getElementById('trip-name-display');
  var rd=document.getElementById('trip-route-display');
  if(nd) nd.textContent=S.tripName||'Странник';
  if(rd) rd.textContent=S.tripRoute||'';
}
function saveTripName(){
  var name=document.getElementById('tn-name').value.trim();
  var route=document.getElementById('tn-route').value.trim();
  if(name) S.tripName=name;
  S.tripRoute=route;
  save(); updateHeader(); closeM('m-tripname');
}

// ── NAVIGATION ──
function showPage(name, tab){
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('page-'+name).classList.add('active');
  if(tab) tab.classList.add('active');
  render();
}

// ── MODALS ──
var activeCityId = null;
function openM(id){
  if(id==='m-budget'){
    document.getElementById('b-val').value = S.budget.total||'';
    document.getElementById('b-pp').value = S.budget.pp||'total';
  }
  if(id==='m-tripname'){
    document.getElementById('tn-name').value = S.tripName||'';
    document.getElementById('tn-route').value = S.tripRoute||'';
  }
  document.getElementById(id).classList.add('open');
}
function closeM(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.mo').forEach(function(m){
  m.addEventListener('click', function(e){ if(e.target===m) m.classList.remove('open'); });
});

// ── DOM HELPERS ──
function el(tag, attrs, children){
  var e = document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==='class') e.className=attrs[k];
    else if(k==='style') e.style.cssText=attrs[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if(children) children.forEach(function(c){
    if(typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if(c) e.appendChild(c);
  });
  return e;
}
function txt(s){ return document.createTextNode(String(s||'')); }
function setHTML(id, node){
  var container = document.getElementById(id);
  container.innerHTML = '';
  if(node) container.appendChild(node);
}
function setHTMLStr(id, html){
  document.getElementById(id).innerHTML = html;
}

// ── RENDER ──
function render(){
  var a = document.querySelector('.page.active');
  if(!a) return;
  if(a.id==='page-overview') renderOverview();
  else if(a.id==='page-journey') renderJourney();
  else if(a.id==='page-checklist') renderChecklist();
  else if(a.id==='page-weather') renderWeather();
}

// ── UTILS ──
function fmt(n){ return Math.round(n).toLocaleString('ru-RU'); }
function fmtDT(s){
  if(!s) return '';
  try{ return new Date(s).toLocaleString('ru-RU',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
  catch(e){ return s; }
}
function fmtD(s){
  if(!s) return '';
  try{ return new Date(s).toLocaleDateString('ru-RU',{day:'2-digit',month:'long'}); }
  catch(e){ return s; }
}
function fmtSize(b){
  if(b<1024) return b+'Б';
  if(b<1048576) return Math.round(b/1024)+'КБ';
  return (b/1048576).toFixed(1)+'МБ';
}
function duration(dep, arr){
  var ms = new Date(arr)-new Date(dep);
  if(ms<=0) return '';
  var h = Math.floor(ms/3600000), m = Math.round((ms%3600000)/60000);
  return h>0 ? h+'ч '+m+'м' : m+'м';
}
function toB64(file){
  return new Promise(function(res,rej){
    var r = new FileReader();
    r.onload = function(){ res(r.result.split(',')[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function b64toBlob(b64, mime){
  var bytes = atob(b64);
  var arr = new Uint8Array(bytes.length);
  for(var i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
function totalSpent(){
  var t=0;
  S.journey.forEach(function(x){
    if(x.kind==='city')(x.expenses||[]).forEach(function(e){ t+=Number(e.amount)*(Number(e.x2)||1); });
  });
  return t;
}

// ── OVERVIEW ──
function renderOverview(){
  var pg = document.getElementById('page-overview');
  pg.innerHTML = '';

  // hint
  if(!localStorage.getItem('hint-dismissed')){
    var hint = el('div',{class:'hint'},[
      el('span',{class:'xb',onclick:function(){ hint.remove(); localStorage.setItem('hint-dismissed','1'); }},['✕']),
      el('b',null,['💾 Сохраните на телефон']),
      txt('iOS: Поделиться → «На экран Домой»'), el('br'), txt('Android: меню → «Установить приложение»')
    ]);
    pg.appendChild(hint);
  }

  // stats
  var total = totalSpent();
  var cities = S.journey.filter(function(x){ return x.kind==='city'; }).length;
  var cl = S.checklist.length, cld = S.checklist.filter(function(x){ return x.done; }).length;
  var allT=0, doneT=0;
  S.journey.forEach(function(x){ if(x.kind==='city'){ allT+=(x.tasks||[]).length; doneT+=(x.tasks||[]).filter(function(t){return t.done;}).length; } });

  var grid = el('div',{class:'stat-grid'});
  [{lbl:'Городов',val:cities,cls:'ac'},{lbl:'Потрачено',val:fmt(total)+' ₽',cls:'rd'},{lbl:'Задач',val:doneT+'/'+allT,cls:''},{lbl:'Пакинг',val:cld+'/'+cl,cls:'gr'}].forEach(function(s,i2){
    var statEl=el('div',{class:'stat'});
    statEl.appendChild(el('div',{class:'sl'},[txt(s.lbl)]));
    var valEl=el('div',{class:'sv '+(s.cls||'')},[txt(s.val)]);
    statEl.appendChild(valEl);
    grid.appendChild(statEl);
    (function(ve){setTimeout(function(){ve.classList.add('counting');setTimeout(function(){ve.classList.remove('counting');},300);},50*(i2+1));})(valEl);
  });
  pg.appendChild(grid);

  // budget
  var secBudget = el('div',{class:'sec'},[txt('Бюджет'), el('button',{class:'btn-g',onclick:function(){ openM('m-budget'); }},['Изменить'])]);
  pg.appendChild(secBudget);
  var bcard = el('div',{class:'budget-card'});
  var bv = S.budget.total*(S.budget.pp==='each'?2:1);
  if(bv>0){
    var pct = Math.min(100,Math.round(total/bv*100));
    var cls = pct>90?'bl-d':pct>70?'bl-w':'bl-ok';
    var left = bv-total;
    bcard.appendChild(el('div',{class:'bar'},[el('div',{class:'bar-f '+cls,style:'width:'+pct+'%'})]));
    bcard.appendChild(el('div',{class:'bar-lbl'},[el('span',null,[txt(pct+'% потрачено')]),el('span',null,[txt(fmt(total)+' / '+fmt(bv)+' ₽')])]));
    bcard.appendChild(el('div',{style:'font-size:13px;margin-top:8px;color:var('+(left<0?'--rd':'--gr')+')'},[txt((left<0?'Перерасход':'Остаток')+': '+fmt(Math.abs(left))+' ₽')]));
  } else {
    bcard.appendChild(el('div',{style:'font-size:13px;color:var(--tx3);margin-top:4px'},[txt('Бюджет не задан')]));
  }
  pg.appendChild(bcard);

  // next event
  pg.appendChild(el('div',{class:'sec'},[txt('Следующее событие')]));
  var now = Date.now();
  var nextEv = null;
  S.journey.forEach(function(x){
    var dt = x.kind==='transit'?x.dep:x.from;
    if(dt && new Date(dt)>now){ if(!nextEv||new Date(dt)<new Date(nextEv.kind==='transit'?nextEv.dep:nextEv.from)) nextEv=x; }
  });
  var ncard = el('div',{class:'next-card'});
  if(nextEv){
    var ico2 = {train:'🚂',plane:'✈️',bus:'🚌'};
    if(nextEv.kind==='city'){
      ncard.appendChild(el('div',{style:'font-size:16px;margin-bottom:5px'},[txt('📍 '+nextEv.name)]));
      if(nextEv.from) ncard.appendChild(el('div',{style:'font-size:12px;color:var(--tx2)'},[txt('📅 '+fmtD(nextEv.from)+(nextEv.to?' → '+fmtD(nextEv.to):''))]));
      if(nextEv.hotel) ncard.appendChild(el('div',{style:'font-size:12px;color:var(--tx3);margin-top:3px'},[txt('🏨 '+nextEv.hotel)]));
    } else {
      ncard.appendChild(el('div',{style:'font-size:16px;margin-bottom:5px'},[txt((ico2[nextEv.type]||'🚂')+' '+nextEv.from+' → '+nextEv.to)]));
      if(nextEv.dep) ncard.appendChild(el('div',{style:'font-size:12px;color:var(--tx2)'},[txt('📅 '+fmtDT(nextEv.dep)+(nextEv.arr?' → '+fmtDT(nextEv.arr):''))]));
      if(nextEv.num) ncard.appendChild(el('div',{style:'font-size:12px;color:var(--tx3);margin-top:3px'},[txt(nextEv.num)]));
      if(nextEv.dep&&nextEv.arr) ncard.appendChild(el('div',{style:'font-size:12px;color:var(--ac);margin-top:3px'},[txt('⏱ '+duration(nextEv.dep,nextEv.arr))]));
    }
  } else {
    ncard.appendChild(el('div',{style:'font-size:13px;color:var(--tx3)'},[txt('Нет предстоящих событий')]));
  }
  pg.appendChild(ncard);

  // tickets
  var tfBtn = el('button',{class:'btn-g',onclick:function(){ document.getElementById('tf').click(); }},['+ Файл']);
  pg.appendChild(el('div',{class:'sec'},[txt('Билеты и документы'), tfBtn]));
  var dz = el('div',{class:'drop-z',onclick:function(){ document.getElementById('tf').click(); }},[txt('📎 PDF / JPG / PNG · хранится офлайн на телефоне')]);
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dg');});
  dz.addEventListener('dragleave',function(){dz.classList.remove('dg');});
  dz.addEventListener('drop',function(e){
    e.preventDefault();dz.classList.remove('dg');
    var f=e.dataTransfer.files[0]; if(!f) return;
    var fi=document.getElementById('tf');
    var dt=new DataTransfer(); dt.items.add(f); fi.files=dt.files;
    addTicket({target:fi});
  });
  pg.appendChild(dz);
  renderTicketsInto(pg);

  // cats
  pg.appendChild(el('div',{class:'sec'},[txt('Расходы по категориям')]));
  var catN={t:'🚂 Транспорт',f:'🍽 Питание',s:'🏨 Жильё',k:'🎟 Билеты',o:'📦 Прочее'};
  var ct={};
  S.journey.forEach(function(x){ if(x.kind==='city')(x.expenses||[]).forEach(function(e){ ct[e.cat]=(ct[e.cat]||0)+Number(e.amount)*(Number(e.x2)||1); }); });
  var catsDiv = el('div');
  var catEntries = Object.keys(ct).sort(function(a,b){return ct[b]-ct[a];});
  if(catEntries.length===0){
    catsDiv.appendChild(el('div',{class:'empty',style:'padding:10px 0'},[txt('Нет расходов')]));
  } else {
    catEntries.forEach(function(k){
      var row = el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--br);font-size:14px'});
      row.appendChild(el('span',null,[txt(catN[k]||k)]));
      row.appendChild(el('span',{style:'color:var(--rd)'},[txt(fmt(ct[k])+' ₽')]));
      catsDiv.appendChild(row);
    });
  }
  pg.appendChild(catsDiv);
}

function renderTicketsInto(pg){
  if(!S.tickets.length){
    pg.appendChild(el('div',{style:'font-size:13px;color:var(--tx3);padding:4px 0 10px'},[txt('Нет файлов')]));
    return;
  }
  var strip = el('div',{class:'tstrip'});
  [...S.tickets].sort(function(a,b){return b.ts-a.ts;}).forEach(function(t){
    var row = el('div',{class:'trow'});
    row.appendChild(el('div',{class:'tico '+(t.type||'img')},[txt(t.type==='pdf'?'📄':'🖼')]));
    var ti = el('div',{class:'ti'});
    ti.appendChild(el('div',{class:'tn'},[txt(t.name)]));
    ti.appendChild(el('div',{class:'tm'},[txt(fmtSize(t.size))]));
    row.appendChild(ti);
    if(t.type==='img'){
      var thumb = el('img',{class:'tthumb',src:'data:'+t.mime+';base64,'+t.data,onclick:function(){viewTicket(t.id);}});
      row.appendChild(thumb);
    }
    var btns = el('div',{style:'display:flex;gap:5px'});
    btns.appendChild(el('button',{class:'btn-g',onclick:function(){viewTicket(t.id);}},['👁']));
    btns.appendChild(el('button',{class:'btn-g',onclick:function(){dlTicket(t.id);}},['⬇']));
    btns.appendChild(el('button',{class:'btn-d',onclick:function(){delTicket(t.id);}},['✕']));
    row.appendChild(btns);
    strip.appendChild(row);
  });
  pg.appendChild(strip);
}

async function addTicket(ev){
  var f=ev.target.files[0]; if(!f) return;
  var isPdf=f.type==='application/pdf', isImg=f.type.startsWith('image/');
  if(!isPdf&&!isImg){ alert('PDF, JPG или PNG'); ev.target.value=''; return; }
  if(f.size>(isPdf?5:3)*1048576){ alert('Макс '+(isPdf?5:3)+'МБ'); ev.target.value=''; return; }
  var base64=await toB64(f);
  S.tickets.push({id:uid(),name:f.name.replace(/\.[^.]+$/,''),type:isPdf?'pdf':'img',mime:f.type,size:f.size,data:base64,ts:Date.now()});
  save(); ev.target.value=''; renderOverview();
}
function viewTicket(id){
  var t=S.tickets.find(function(x){return x.id===id;}); if(!t) return;
  document.getElementById('v-title').textContent=t.name;
  var body=document.getElementById('v-body'); body.innerHTML='';
  if(t.type==='img'){
    var img=document.createElement('img'); img.src='data:'+t.mime+';base64,'+t.data; img.style.cssText='max-width:100%;max-height:80vh;border-radius:8px'; body.appendChild(img);
  } else {
    var blob=b64toBlob(t.data,t.mime); var url=URL.createObjectURL(blob);
    var iframe=document.createElement('iframe'); iframe.src=url; iframe.style.cssText='width:100%;height:80vh;border:none;border-radius:8px;background:#fff'; body.appendChild(iframe);
  }
  document.getElementById('viewer').classList.add('open');
}
function closeViewer(){ document.getElementById('viewer').classList.remove('open'); document.getElementById('v-body').innerHTML=''; }
function dlTicket(id){
  var t=S.tickets.find(function(x){return x.id===id;}); if(!t) return;
  var ext=t.type==='pdf'?'.pdf':t.mime.includes('png')?'.png':'.jpg';
  var a=document.createElement('a'); a.href=URL.createObjectURL(b64toBlob(t.data,t.mime)); a.download=t.name+ext; a.click();
}
function delTicket(id){
  if(!confirm('Удалить?')) return;
  S.tickets=S.tickets.filter(function(t){return t.id!==id;}); save(); renderOverview();
}

// ── JOURNEY ──
var transIco={train:'🚂',plane:'✈️',bus:'🚌'};
var linkEmj={hotel:'🏨',sight:'🏛',food:'🍽',other:'🔗'};
var catDot={t:'et',f:'ef',s:'es',k:'ek',o:'eo'};
var catEmj={t:'🚂',f:'🍽',s:'🏨',k:'🎟',o:'📦'};
var whoLabel={both:'👫 Оба',me:'🧔 Я',wife:'👩 Жена'};
var taskTypeEmj={'':'','hotel':'🏨','sight':'🏛','walk':'🚶','food':'🍽','shop':'🛍','other':'📍'};
var whoCls={both:'both',me:'me',wife:'wife'};

function renderJourney(){
  var pg=document.getElementById('page-journey');
  pg.innerHTML='';
  var hdr=el('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-top:4px;margin-bottom:14px'});
  hdr.appendChild(el('span',{style:'font-size:14px;color:var(--tx2)'},[txt('Города и перегоны')]));
  var btns2=el('div',{style:'display:flex;gap:7px'});
  btns2.appendChild(el('button',{class:'btn-g',onclick:function(){openAddTransit();}},['+ Перегон']));
  btns2.appendChild(el('button',{class:'btn',onclick:function(){openAddCity();}},['+ Город']));
  hdr.appendChild(btns2);
  pg.appendChild(hdr);

  if(!S.journey.length){
    pg.appendChild(el('div',{class:'empty'},[txt('Добавьте первый город или перегон')]));
    return;
  }

  S.journey.forEach(function(x,i){
    if(x.kind==='transit'){
      var dur=x.dep&&x.arr?duration(x.dep,x.arr):'';
      var tr=el('div',{class:'transit'});
      tr.appendChild(el('div',{class:'transit-line'}));
      var tc=el('div',{class:'transit-content'});
      tc.appendChild(el('div',{class:'transit-vehicle'},[txt(transIco[x.type]||'🚂')]));
      var ti2=el('div',{class:'transit-info'});
      ti2.appendChild(el('div',{class:'transit-main'},[txt(x.from+' → '+x.to)]));
      ti2.appendChild(el('div',{class:'transit-detail'},[txt((x.dep?fmtDT(x.dep):'')+(x.arr?' → '+fmtDT(x.arr):'')+(x.num?' · '+x.num:''))]));
      tc.appendChild(ti2);
      if(dur) tc.appendChild(el('div',{class:'transit-dur'},[txt(dur)]));
      (function(xid){ tc.appendChild(el('button',{class:'btn-g',style:'padding:4px 8px;font-size:12px',onclick:function(){openEditTransit(xid);}},['✎'])); tc.appendChild(el('button',{class:'btn-d',onclick:function(){delJourney(xid);}},['✕'])); })(x.id);
      tr.appendChild(tc);
      pg.appendChild(tr);
      return;
    }
    // city
    var tasks=x.tasks||[],exps=x.expenses||[],links=x.links||[];
    var taskDone=tasks.filter(function(t){return t.done;}).length;
    var dayCount=x.from&&x.to?Math.max(1,Math.round((new Date(x.to)-new Date(x.from))/86400000)):null;
    var cityTotal=exps.reduce(function(s,e){return s+Number(e.amount)*(Number(e.x2)||1);},0);

    var card=el('div',{class:'city-block'});
    var cc=el('div',{class:'city-card'+(x.completed?' completed':''),id:'cc-'+x.id});
    var head=el('div',{class:'city-head'});
    head.appendChild(el('div',{class:'city-dot'}));
    var ci=el('div',{class:'city-info'});
    var nameRow=el('div',{style:'display:flex;align-items:center;gap:8px'});
    nameRow.appendChild(el('div',{class:'city-name'},[txt(x.name)]));
    if(x.completed) nameRow.appendChild(el('span',{class:'city-stamp'},[txt('Готово')]));
    ci.appendChild(nameRow);
    ci.appendChild(el('div',{class:'city-sub'},[txt((x.from?fmtD(x.from):'')+(x.to?' → '+fmtD(x.to):'')+(dayCount?' · '+dayCount+' дн.':''))]));
    var tagsDiv=el('div',{class:'city-tags'});
    if(x.hotel) tagsDiv.appendChild(el('span',{class:'tag'},[txt('🏨 '+x.hotel)]));
    if(tasks.length) tagsDiv.appendChild(el('span',{class:'tag'+(taskDone===tasks.length&&tasks.length?' ac':'')},[txt(taskDone+'/'+tasks.length+' задач')]));
    if(cityTotal) tagsDiv.appendChild(el('span',{class:'tag'},[txt('💸 '+fmt(cityTotal)+' ₽')]));

    ci.appendChild(tagsDiv);
    head.appendChild(ci);
    var headRight=el('div',{style:'display:flex;align-items:flex-start;gap:5px'});
    (function(xid,done){
      headRight.appendChild(el('button',{class:'btn-g',style:'padding:3px 7px;font-size:12px',title:done?'Снять отметку':'Отметить завершённым',onclick:function(e){e.stopPropagation();toggleCityDone(xid);}},[ done?'↩':'✔' ]));
      headRight.appendChild(el('button',{class:'btn-g',style:'padding:3px 7px;font-size:12px',onclick:function(e){e.stopPropagation();openEditCity(xid);}},['✎']));
      headRight.appendChild(el('button',{class:'btn-d',style:'padding:3px 7px',onclick:function(e){e.stopPropagation();delJourney(xid);}},['✕']));
    })(x.id, !!x.completed);
    headRight.appendChild(el('span',{class:'arr'},[txt('▼')]));
    head.appendChild(headRight);
    (function(xid){ head.addEventListener('click',function(){toggleCity(xid);}); })(x.id);
    cc.appendChild(head);

    var body=el('div',{class:'city-body'});
    if(x.note){ var noteDiv=el('div',{style:'font-size:13px;color:var(--tx2);line-height:1.5;margin-bottom:10px;white-space:pre-wrap'},[txt(x.note)]); body.appendChild(noteDiv); }

    // tasks section
    var tSec=el('div',{class:'sec',style:'margin-top:'+(x.note?'0':'8px')});
    tSec.appendChild(txt('Задачи'));
    (function(xid){ tSec.appendChild(el('button',{class:'btn-g',style:'text-transform:none;letter-spacing:0',onclick:function(){openAddTask(xid);}},['+ Добавить'])); })(x.id);
    body.appendChild(tSec);
    var tList=el('div',{id:'tl-'+x.id});
    buildTaskList(tList, x);
    body.appendChild(tList);
    var qaRow=el('div',{class:'row'});
    var qaInp=el('input',{placeholder:'+ Задача быстро...',id:'tq-'+x.id});
    (function(xid){ qaInp.addEventListener('keydown',function(e){if(e.key==='Enter')quickCityTask(xid);}); })(x.id);
    qaRow.appendChild(qaInp);
    (function(xid){ qaRow.appendChild(el('button',{class:'btn',onclick:function(){quickCityTask(xid);}},['+']),[]); })(x.id);
    body.appendChild(qaRow);

    // expenses section
    var eSec=el('div',{class:'sec'});
    eSec.appendChild(txt('Расходы'+(cityTotal?' — '+fmt(cityTotal)+' ₽':'')));
    (function(xid){ eSec.appendChild(el('button',{class:'btn-g',style:'text-transform:none;letter-spacing:0',onclick:function(){openAddExpense(xid);}},['+ Добавить'])); })(x.id);
    body.appendChild(eSec);
    var eList=el('div',{id:'el-'+x.id});
    buildExpList(eList, x);
    body.appendChild(eList);



    cc.appendChild(body);
    card.appendChild(cc);
    pg.appendChild(card);
  });
}

function buildTaskList(container, x){
  container.innerHTML='';
  var tasks=x.tasks||[];
  if(!tasks.length){ container.appendChild(el('div',{style:'font-size:13px;color:var(--tx3);padding:5px 0'},[txt('Нет задач')])); return; }
  tasks.forEach(function(t){
    var row=el('div',{class:'task-item'});
    var chk=el('div',{class:'chk'+(t.done?' done':'')});
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox','0 0 12 10');var path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d','M1,5 L4,8.5 L11,1');path.setAttribute('stroke','#3d7a5a');path.setAttribute('stroke-width','2');path.setAttribute('fill','none');path.setAttribute('stroke-linecap','round');svg.appendChild(path);chk.appendChild(svg);
    (function(xid,tid){ chk.addEventListener('click',function(){toggleCityTask(xid,tid);}); })(x.id,t.id);
    row.appendChild(chk);
    var right=el('div',{style:'flex:1;min-width:0'});
    var taskTxEl=el('div',{class:'task-tx'+(t.done?' done':''),style:'display:flex;align-items:baseline;gap:5px'});
    if(t.type&&taskTypeEmj[t.type]) taskTxEl.appendChild(el('span',{style:'font-size:12px;flex-shrink:0'},[txt(taskTypeEmj[t.type])]));
    var innerSpan=el('span',{class:'task-tx-inner'},[txt(t.text)]);
    taskTxEl.appendChild(innerSpan);
    right.appendChild(taskTxEl);
    if(t.note) right.appendChild(el('div',{style:'font-size:12px;color:var(--tx2);margin-top:2px;white-space:pre-wrap;line-height:1.4'},[txt(t.note)]));
    var meta=el('div',{style:'display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px'});
    meta.appendChild(el('span',{class:'task-who '+(whoCls[t.who]||'both')},[txt(whoLabel[t.who]||'👫 Оба')]));
    if(t.url){
      var linkEl;
      if(t.linkLoading){
        linkEl=el('span',{style:'font-size:11px;color:var(--tx3)'},['⏳ загружаю...']);
      } else {
        var linkTitle=t.linkTitle||t.url;
        if(linkTitle.length>35) linkTitle=linkTitle.slice(0,33)+'…';
        linkEl=el('a',{style:'font-size:11px;color:var(--bl);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;display:inline-block;vertical-align:middle',href:t.url,target:'_blank'},[txt('🔗 '+linkTitle)]);
      }
      meta.appendChild(linkEl);
    }
    right.appendChild(meta);
    row.appendChild(right);
    var editBtn=el('span',{class:'dx',style:'color:var(--tx3);font-size:13px'},[txt('✎')]);
    (function(xid,tid){ editBtn.addEventListener('click',function(){openEditTask(xid,tid);}); })(x.id,t.id);
    row.appendChild(editBtn);
    var dx=el('span',{class:'dx'},[txt('✕')]);
    (function(xid,tid){ dx.addEventListener('click',function(){delCityTask(xid,tid);}); })(x.id,t.id);
    row.appendChild(dx);
    container.appendChild(row);
  });
}

function buildExpList(container, x){
  container.innerHTML='';
  var exps=x.expenses||[];
  if(!exps.length){ container.appendChild(el('div',{style:'font-size:13px;color:var(--tx3);padding:5px 0'},[txt('Нет расходов')])); return; }
  exps.forEach(function(e){
    var row=el('div',{class:'exp-item'});
    row.appendChild(el('div',{class:'ecat '+(catDot[e.cat]||'eo')},[txt(catEmj[e.cat]||'📦')]));
    row.appendChild(el('div',{class:'enm'},[txt(e.name)]));
    if(Number(e.x2)===2) row.appendChild(el('div',{class:'ex2'},[txt('×2')]));
    row.appendChild(el('div',{class:'eam'},[txt(fmt(Number(e.amount)*(Number(e.x2)||1))+' ₽')]));
    var editE=el('span',{class:'dx',style:'color:var(--tx3);font-size:13px'},[txt('✎')]);
    (function(xid,eid){ editE.addEventListener('click',function(){openEditExpense(xid,eid);}); })(x.id,e.id);
    row.appendChild(editE);
    var dx=el('span',{class:'dx'},[txt('✕')]);
    (function(xid,eid){ dx.addEventListener('click',function(){delCityExpense(xid,eid);}); })(x.id,e.id);
    row.appendChild(dx);
    container.appendChild(row);
  });
}

function toggleCity(id){
  var cc=document.getElementById('cc-'+id);
  if(cc) cc.classList.toggle('open');
}
function toggleCityDone(id){
  var x=S.journey.find(function(j){return j.id===id;});
  if(!x) return;
  x.completed=!x.completed;
  save(); renderJourney();
  if(x.completed) reOpenCity(id);
}
function reOpenCity(id){
  var cc=document.getElementById('cc-'+id);
  if(cc) cc.classList.add('open');
}

// Patch only the internals of a city card without full re-render (prevents jitter)
function patchCity(cid){
  var x=S.journey.find(function(j){return j.id===cid;}); if(!x) return;
  // tasks
  var tl=document.getElementById('tl-'+cid);
  if(tl){ buildTaskList(tl,x); }
  // expenses
  var el2=document.getElementById('el-'+cid);
  if(el2){ buildExpList(el2,x); }
  // tags in header
  var cc=document.getElementById('cc-'+cid); if(!cc) return;
  var tagsDiv=cc.querySelector('.city-tags');
  if(tagsDiv){
    var tasks=x.tasks||[],exps=x.expenses||[];
    var taskDone=tasks.filter(function(t){return t.done;}).length;
    var cityTotal=exps.reduce(function(s,e){return s+Number(e.amount)*(Number(e.x2)||1);},0);
    tagsDiv.innerHTML='';
    if(x.hotel){var t=document.createElement('span');t.className='tag';t.textContent='🏨 '+x.hotel;tagsDiv.appendChild(t);}
    if(tasks.length){var t=document.createElement('span');t.className='tag'+(taskDone===tasks.length&&tasks.length?' ac':'');t.textContent=taskDone+'/'+tasks.length+' задач';tagsDiv.appendChild(t);}
    if(cityTotal){var t=document.createElement('span');t.className='tag';t.textContent='💸 '+fmt(cityTotal)+' ₽';tagsDiv.appendChild(t);}
  }
  // expense section label
  var eSec=cc.querySelector('.city-body .sec');
  if(eSec){
    var exps=x.expenses||[];
    var cityTotal=exps.reduce(function(s,e){return s+Number(e.amount)*(Number(e.x2)||1);},0);
    // update just the text node
    var firstChild=eSec.firstChild;
    if(firstChild&&firstChild.nodeType===3) firstChild.textContent='Расходы'+(cityTotal?' — '+fmt(cityTotal)+' ₽':'');
  }
}

function openAddCity(){
  document.getElementById('cy-edit-id').value='';
  document.getElementById('m-city-title').textContent='Новый город';
  document.getElementById('cy-save-btn').textContent='Добавить';
  ['cy-name','cy-from','cy-to','cy-hotel','cy-note'].forEach(function(i){document.getElementById(i).value='';});
  openM('m-city');
}
function openEditCity(id){
  var x=S.journey.find(function(j){return j.id===id;}); if(!x) return;
  document.getElementById('cy-edit-id').value=id;
  document.getElementById('m-city-title').textContent='Редактировать город';
  document.getElementById('cy-save-btn').textContent='Сохранить';
  document.getElementById('cy-name').value=x.name||'';
  document.getElementById('cy-from').value=x.from||'';
  document.getElementById('cy-to').value=x.to||'';
  document.getElementById('cy-hotel').value=x.hotel||'';
  document.getElementById('cy-note').value=x.note||'';
  openM('m-city');
}
function saveCity(){
  var name=document.getElementById('cy-name').value.trim(); if(!name) return;
  var editId=document.getElementById('cy-edit-id').value;
  var data={name:name,from:document.getElementById('cy-from').value,to:document.getElementById('cy-to').value,hotel:document.getElementById('cy-hotel').value,note:document.getElementById('cy-note').value};
  if(editId){
    var x=S.journey.find(function(j){return j.id===editId;}); if(x) Object.assign(x,data);
    save(); closeM('m-city');
    renderJourney(); reOpenCity(editId);
  } else {
    S.journey.push(Object.assign({kind:'city',id:uid(),tasks:[],expenses:[],links:[]},data));
    save(); closeM('m-city');
    ['cy-name','cy-from','cy-to','cy-hotel','cy-note'].forEach(function(i){document.getElementById(i).value='';});
    renderJourney();
  }
}

function openAddTask(cid){
  activeCityId=cid;
  document.getElementById('tk-edit-id').value='';
  document.getElementById('m-task-title').textContent='Задача';
  document.getElementById('tk-save-btn').textContent='Добавить';
  ['tk-txt','tk-url','tk-note'].forEach(function(i){document.getElementById(i).value='';});
  document.getElementById('tk-type').value='';
  document.getElementById('tk-link-status').innerHTML='';
  openM('m-task');
}
function openEditTask(cid,tid){
  activeCityId=cid;
  var city=S.journey.find(function(x){return x.id===cid;}); if(!city) return;
  var t=city.tasks.find(function(t){return t.id===tid;}); if(!t) return;
  document.getElementById('tk-edit-id').value=tid;
  document.getElementById('m-task-title').textContent='Редактировать задачу';
  document.getElementById('tk-save-btn').textContent='Сохранить';
  document.getElementById('tk-txt').value=t.text||'';
  document.getElementById('tk-url').value=t.url||'';
  document.getElementById('tk-note').value=t.note||'';
  document.getElementById('tk-type').value=t.type||'';
  document.getElementById('tk-link-status').innerHTML='';
  openM('m-task');
}
function saveTask(){
  var text=document.getElementById('tk-txt').value.trim(); if(!text) return;
  var editId=document.getElementById('tk-edit-id').value;
  var url=document.getElementById('tk-url').value.trim();
  var note=document.getElementById('tk-note').value.trim();
  var who='both';
  var type=document.getElementById('tk-type').value;
  var city=S.journey.find(function(x){return x.id===activeCityId;}); if(!city) return;
  if(editId){
    var t=city.tasks.find(function(t){return t.id===editId;});
    if(t){ t.text=text; t.who=who; t.type=type; t.url=url||''; t.note=note; if(!url) t.linkTitle=''; }
    save(); closeM('m-task');

async function fetchWeather(){
  var cities=S.journey.filter(function(x){return x.kind==='city';});
  if(!cities.length){alert('Добавьте города в маршрут');return;}
  var btn=document.getElementById('wx-refresh-btn');
  btn.disabled=true; btn.textContent='Загружаю...';
  var status=document.getElementById('wx-status');
  var ok=0,fail=0;
  for(var i=0;i<cities.length;i++){
    var city=cities[i];
    status.innerHTML='<span class="spinner"><\/span> '+city.name+' ('+(i+1)+'/'+cities.length+')...';
    try{
      var res=await fetch('https://wttr.in/'+encodeURIComponent(city.name)+'?format=j1&lang=ru');
      if(!res.ok) throw new Error('HTTP '+res.status);
      var data=await res.json();
      if(!data.weather||!data.weather.length) throw new Error('Нет данных');
      var idx=S.journey.findIndex(function(x){return x.id===city.id;});
      if(idx>=0){
        S.journey[idx].weather=data;
        S.journey[idx].weatherErr=false;
        S.journey[idx].weatherErrMsg='';
        S.journey[idx].weatherUpdated=new Date().toLocaleString('ru-RU',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
      }
      save(); ok++;
    } catch(e){
      var idx2=S.journey.findIndex(function(x){return x.id===city.id;});
      if(idx2>=0){S.journey[idx2].weatherErr=true;S.journey[idx2].weatherErrMsg=e.message||'Ошибка';}
      save(); fail++;
      status.textContent='⚠️ '+city.name+': '+(e.message||'Ошибка');
      await new Promise(function(r){setTimeout(r,1200);});
    }
  }
  btn.disabled=false; btn.textContent='🔄 Обновить погоду (нужен интернет)';
  if(fail===0) status.textContent='✓ Загружено '+ok+' '+(ok===1?'город':ok<5?'города':'городов');
  else if(ok===0) status.textContent='❌ Не удалось загрузить. Проверьте интернет.';
  else status.textContent='✓ '+ok+' загружено · ⚠️ '+fail+' не удалось';
  setTimeout(function(){status.textContent='';},4000);
  renderWeather();
}

async function shareData(){
  // Embed current state into a copy of this HTML file
  // Read the current page HTML, inject data as a script block
  var dataScript='<script id="__preload__">var __PRELOAD__='+JSON.stringify(
    Object.assign({},S,{tickets:S.tickets.map(function(t){return Object.assign({},t,{data:'__omitted__'});})})
  )+';\x3c/script>';

  // Build full HTML with injected data
  var html=document.documentElement.outerHTML;
  // Inject preload script right before closing body tag
  html=html.replace('\x3c/body>','<!-- preload -->\n'+dataScript+'\n\x3c/body>');

  var name=(S.tripName||'strannik')+'_'+new Date().toISOString().slice(0,10)+'.html';
  var blob=new Blob([html],{type:'text/html'});
  var file=new File([blob],name,{type:'text/html'});

  // Try file share (HTML is allowed by Web Share API)
  if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file],title:S.tripName||'Странник'});
      return;
    }catch(e){
      if(e.name==='AbortError') return;
    }
  }
  // Fallback: download
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
}

function handleImport(e){
  var file=e.target.files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(!confirm('Загрузить данные? Текущие данные будут заменены.')) return;
      // Use same migration logic as load()
      if(d.journey){
        S=d;
      } else {
        // old v1/v2 format
        S={journey:[],checklist:[],tickets:[],budget:{total:d.budget||0,pp:'total'},tripName:d.tripName||'Странник',tripRoute:d.tripRoute||''};
        var stops=d.route||[], days=d.days||[];
        S.journey=stops.map(function(stop){
          var tasks=[];
          days.forEach(function(day){
            if(day.name&&stop.city&&(day.name.toLowerCase().indexOf(stop.city.toLowerCase())>=0||stop.city.toLowerCase().indexOf(day.name.toLowerCase())>=0)){
              (day.tasks||[]).forEach(function(t){tasks.push({id:t.id,text:t.text,done:t.done,who:'both'});});
            }
          });
          return {kind:'city',id:stop.id||uid(),name:stop.city||'',from:stop.arrive?(stop.arrive+'').slice(0,10):'',to:stop.depart?(stop.depart+'').slice(0,10):'',hotel:'',note:stop.note||'',tasks:tasks,expenses:[],links:stop.links||[]};
        });
        (d.notes||[]).forEach(function(n){S.checklist.push({id:n.id||uid(),text:n.text,done:false,who:'both',cat:'other'});});
      }
      // Ensure required fields
      if(!S.journey)S.journey=[];
      if(!S.checklist)S.checklist=[];
      if(!S.budget)S.budget={total:0,pp:'total'};
      if(!S.tripName)S.tripName='Странник';
      if(S.tripRoute===undefined)S.tripRoute='';
      // Keep existing tickets if import has omitted placeholders
      var importedTickets=(S.tickets||[]).filter(function(t){return t.data&&t.data!=='__omitted__';});
      S.tickets=importedTickets.length>0?importedTickets:(S.tickets||[]);
      save();
      render();
      updateHeader();
      alert('Данные загружены успешно!');
    } catch(ex){ alert('Ошибка файла: '+ex.message); }
  };
  r.readAsText(file); e.target.value='';
}

// ── INIT ──
load();
// If this file was shared with embedded data, load it
if(typeof __PRELOAD__!=='undefined'){
  var hasOwn=localStorage.getItem(KEY);
  if(!hasOwn){
    S=__PRELOAD__;
    if(!S.journey)S.journey=[];
    if(!S.checklist)S.checklist=[];
    if(!S.tickets)S.tickets=[];
    if(!S.budget)S.budget={total:0,pp:'total'};
    if(!S.tripName)S.tripName='Странник';
    if(S.tripRoute===undefined)S.tripRoute='';
    save();
  }
}
render();
updateHeader();

</script>
